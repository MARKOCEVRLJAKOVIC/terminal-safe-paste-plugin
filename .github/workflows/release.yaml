name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v1.0.0, v1.2.3, etc.

jobs:
  release:
    name: Publish to JetBrains Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Build plugin distribution
        run: ./gradlew buildPlugin --no-daemon

      - name: Verify plugin compatibility
        run: ./gradlew verifyPlugin --no-daemon

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          # Optional: set a release channel (default, eap, beta, etc.)
          # PLUGIN_CHANNEL: default
        run: ./gradlew publishPlugin --no-daemon

      # Also create a GitHub Release so users can download the .zip directly
      - name: Upload plugin zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true