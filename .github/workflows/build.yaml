name: Build & Verify

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Gradle Configuration Cache & Build Cache are already enabled in gradle.properties,
      # so repeated runs benefit from caching automatically.
      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/
          retention-days: 7

      - name: Build plugin distribution
        run: ./gradlew buildPlugin --no-daemon

      - name: Verify plugin
        run: ./gradlew verifyPlugin --no-daemon

      - name: Upload Plugin Verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verifier-report
          path: build/reports/pluginVerifier/
          retention-days: 7

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: safe-paste-plugin
          path: build/distributions/*.zip
          retention-days: 7